name: PathFinder UI Automation

on:
  # Run on every push to main
  push:
    branches: [ main ]

  # Run on pull requests to main
  pull_request:
    branches: [ main ]

  # Run on a schedule — every day at 8:00 AM IST (2:30 AM UTC)
  schedule:
    - cron: '30 2 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  pages: write
  id-token: write

jobs:
  automation:
    name: Run Selenium Cucumber Tests
    runs-on: ubuntu-latest

    steps:

      # ============================================================
      # 1. Checkout code
      # ============================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # 2. Set up Java 21
      # ============================================================
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ============================================================
      # 3. Verify Chrome is available (pre-installed on ubuntu-latest)
      # ============================================================
      - name: Verify Chrome Installation
        run: |
          google-chrome --version || chromium-browser --version
          which google-chrome || which chromium-browser

      # ============================================================
      # 4. Create config.properties from GitHub Secrets
      #    (Never store real credentials in code)
      # ============================================================
      - name: Create config.properties
        run: |
          cat > PathFinder_UI_Automation/src/test/resources/config.properties << EOF
          pathfinder.url=${{ secrets.PATHFINDER_URL }}
          SECRET_PASSKEY=${{ secrets.SECRET_PASSKEY }}
          USER_NAME=${{ secrets.USER_NAME }}
          USER_PASSWORD=${{ secrets.USER_PASSWORD }}
          ORANGE_PLATFORM_ID=${{ secrets.ORANGE_PLATFORM_ID }}
          RED_PLATFORM_ID=${{ secrets.RED_PLATFORM_ID }}
          GREEN_PLATFORM_ID=${{ secrets.GREEN_PLATFORM_ID }}
          ORANGE_TRANSACTION_ID=${{ secrets.ORANGE_TRANSACTION_ID }}
          GREEN_TRANSACTION_ID=${{ secrets.GREEN_TRANSACTION_ID }}
          RED_TRANSACTION_ID=${{ secrets.RED_TRANSACTION_ID }}
          db.url=${{ secrets.DB_URL }}
          db.username=${{ secrets.DB_USERNAME }}
          db.password=${{ secrets.DB_PASSWORD }}
          EOF

      # ============================================================
      # 5. Cache Maven dependencies (speeds up runs)
      # ============================================================
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # ============================================================
      # 6. Run Tests
      # ============================================================
      - name: Run Automation Tests
        working-directory: PathFinder_UI_Automation
        run: mvn test
        continue-on-error: true

      # ============================================================
      # 7. Upload ExtentReport as artifact
      # ============================================================
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport-${{ github.run_number }}
          path: PathFinder_UI_Automation/test-output/
          retention-days: 7

      # ============================================================
      # 8. Upload screenshots on failure
      # ============================================================
      - name: Upload Failure Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FailureScreenshots-${{ github.run_number }}
          path: PathFinder_UI_Automation/test-output/**/screenshots/
          retention-days: 7

      # ============================================================
      # 9. Publish test results summary
      # ============================================================
      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber Test Results
          path: PathFinder_UI_Automation/target/cucumber.xml
          reporter: java-junit
          fail-on-error: false

      # ============================================================
      # 10. Copy screenshots into report folder for GitHub Pages
      # ============================================================
      - name: Prepare Report for GitHub Pages
        if: always()
        run: |
          mkdir -p gh-pages
          # Find latest run folder and copy to gh-pages
          REPORT_DIR=$(find PathFinder_UI_Automation/test-output -name "ExtentReport.html" | head -1 | xargs dirname)
          if [ -d "$REPORT_DIR" ]; then
            cp -r "$REPORT_DIR"/. gh-pages/
          fi
          # Create index.html redirect if not exists
          if [ ! -f gh-pages/index.html ]; then
            cp gh-pages/ExtentReport.html gh-pages/index.html 2>/dev/null || echo "<meta http-equiv='refresh' content='0; url=ExtentReport.html'>" > gh-pages/index.html
          fi

      # ============================================================
      # 11. Deploy report to GitHub Pages
      # ============================================================
      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
          commit_message: "Update test report - Run #${{ github.run_number }}"

      # ============================================================
      # 12. Send Email Notification via SendGrid
      # ============================================================
      - name: Send Email Notification
        if: always()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_LABEL="All Tests Passed"
            STATUS_COLOR="#1a7a3c"
            STATUS_BG="#e6f9ed"
            STATUS_ICON="PASSED"
          else
            STATUS_LABEL="Some Tests Failed"
            STATUS_COLOR="#cc0000"
            STATUS_BG="#fff0f0"
            STATUS_ICON="FAILED"
          fi

          curl --request POST \
            --url https://api.sendgrid.com/v3/mail/send \
            --header "Authorization: Bearer ${SENDGRID_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @- <<EOF
          {
            "personalizations": [
              {
                "to": [{ "email": "parwez.n@maersk.com" }],
                "subject": "PathFinder UI Automation | Run #${RUN_NUMBER} | ${STATUS_ICON}"
              }
            ],
            "from": { "email": "parwez.n@maersk.com", "name": "PathFinder Automation" },
            "content": [
              {
                "type": "text/html",
                "value": "<div style='font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#f4f4f4;padding:20px;border-radius:8px;'><div style='background:#003057;padding:20px;border-radius:8px 8px 0 0;text-align:center;'><h2 style='color:#ffffff;margin:0;'>PathFinder UI Automation</h2><p style='color:#a0c4ff;margin:5px 0 0 0;'>Automated Test Execution Report</p></div><div style='background:#ffffff;padding:24px;border-radius:0 0 8px 8px;'><div style='text-align:center;margin-bottom:20px;'><span style='display:inline-block;padding:10px 24px;border-radius:24px;font-size:18px;font-weight:bold;background:${STATUS_BG};color:${STATUS_COLOR};border:2px solid ${STATUS_COLOR};'>${STATUS_LABEL}</span></div><table style='width:100%;border-collapse:collapse;margin-bottom:20px;'><tr style='background:#f9f9f9;'><td style='padding:10px 14px;font-weight:bold;color:#555;width:40%;'>Run Number</td><td style='padding:10px 14px;color:#222;'>#${RUN_NUMBER}</td></tr><tr><td style='padding:10px 14px;font-weight:bold;color:#555;'>Triggered By</td><td style='padding:10px 14px;color:#222;'>${ACTOR}</td></tr><tr style='background:#f9f9f9;'><td style='padding:10px 14px;font-weight:bold;color:#555;'>Branch</td><td style='padding:10px 14px;color:#222;'>${REF_NAME}</td></tr><tr><td style='padding:10px 14px;font-weight:bold;color:#555;'>Trigger</td><td style='padding:10px 14px;color:#222;'>${EVENT_NAME}</td></tr><tr style='background:#f9f9f9;'><td style='padding:10px 14px;font-weight:bold;color:#555;'>Status</td><td style='padding:10px 14px;color:#222;'>${JOB_STATUS}</td></tr></table><div style='text-align:center;margin:24px 0;'><a href='https://parwez-sheriff-maersk.github.io/PathFinder-UI/' style='display:inline-block;padding:14px 32px;background:#003057;color:#ffffff;text-decoration:none;border-radius:6px;font-size:15px;font-weight:bold;'>View Full Test Report</a></div><p style='color:#888;font-size:12px;text-align:center;margin-top:20px;'>This is an automated notification from GitHub Actions.<br>Repository: <a href='https://github.com/parwez-sheriff-maersk/PathFinder-UI' style='color:#003057;'>PathFinder-UI</a></p></div></div>"
              }
            ]
          }
          EOF
